<!doctype html>
<html>
  <head>
    <title>Electron Test App</title>
  </head>
  <body>
    <h1>Electron Test App Testing</h1>

    <p id="version"></p>
    <p id="status"></p>

    <button onclick="checkUpdate()">Check for updates</button>

    <script>
      // Show version
      window.api.getVersion().then((version) => {
        document.getElementById("version").innerText = "Version: " + version;
      });

      // Update status messages
      window.api.onUpdateStatus((message) => {
        document.getElementById("status").innerText = message;
      });

      function checkUpdate() {
        document.getElementById("status").innerText = "Checking for updates...";
        window.api.checkUpdate();
      }
    </script>
  </body>
</html>
